<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Anvil Desktop</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="app">
        <header class="header">
            <div class="logo">
                <div class="logo-icon"><i class="fas fa-hammer"></i></div>
                <span class="logo-text">Anvil</span>
                <span class="version">Desktop</span>
            </div>
            <div class="header-center">
                <div class="model-selector"><select id="model-select"></select></div>
            </div>
            <div class="header-actions">
                <button id="theme-toggle" class="icon-btn"><i class="fas fa-moon"></i></button>
                <button id="settings-btn" class="icon-btn"><i class="fas fa-cog"></i></button>
            </div>
        </header>
        <div class="main-content">
            <aside class="sidebar">
                <div class="sidebar-section">
                    <h3><i class="fas fa-brain"></i> Models</h3>
                    <div id="models-list" class="nav-list"></div>
                </div>
            </aside>
            <main class="main-area">
                <div class="task-bar">
                    <div class="task-input-wrapper">
                        <i class="fas fa-terminal task-icon"></i>
                        <textarea id="task-input" placeholder="Describe a task..." rows="1"></textarea>
                        <div class="task-actions">
                            <button id="task-run" class="run-btn-sm"><i class="fas fa-play"></i></button>
                        </div>
                    </div>
                </div>
                <div class="output-log" id="output-log">
                    <div class="welcome-full">
                        <div class="welcome-icon"><i class="fas fa-hammer"></i></div>
                        <h1>Anvil Desktop</h1>
                        <p class="welcome-sub">Self-Verified AI Coding Agent</p>
                        <div class="welcome-grid">
                            <button class="welcome-card" onclick="app.setTask('Fix the bug in src/main.py')"><i class="fas fa-bug"></i><span>Fix Bug</span></button>
                            <button class="welcome-card" onclick="app.setTask('Add error handling to API endpoints')"><i class="fas fa-plus-circle"></i><span>Add Feature</span></button>
                            <button class="welcome-card" onclick="app.setTask('Write tests for the auth module')"><i class="fas fa-flask"></i><span>Write Tests</span></button>
                            <button class="welcome-card" onclick="app.setTask('Review code for security issues')"><i class="fas fa-shield-alt"></i><span>Security Audit</span></button>
                            <button class="welcome-card" onclick="app.setTask('Generate docs for all APIs')"><i class="fas fa-book"></i><span>Generate Docs</span></button>
                            <button class="welcome-card" onclick="app.setTask('Refactor database layer')"><i class="fas fa-sync"></i><span>Refactor</span></button>
                        </div>
                    </div>
                </div>
            </main>
        </div>
        <footer class="status-bar">
            <div class="status-left"><div class="status-item"><div id="status-dot" class="status-dot"></div><span id="status-text">Ready</span></div></div>
            <div class="status-right"><div class="status-item"><i class="fas fa-microchip"></i><span id="current-model">-</span></div></div>
        </footer>
    </div>
    <div id="notification-container" class="notification-container"></div>
    <div id="settings-modal" class="modal" style="display:none">
        <div class="modal-content">
            <div class="modal-header"><h2><i class="fas fa-cog"></i> Settings</h2><button class="modal-close" onclick="app.closeSettings()">&times;</button></div>
            <div class="modal-body">
                <div class="settings-section">
                    <h3>API</h3>
                    <div class="setting-item"><label>API Base URL</label><input type="text" id="api-base" value="http://localhost:11434"></div>
                    <div class="setting-item"><label>OpenAI Key (optional)</label><input type="password" id="openai-api-key" placeholder="sk-..."></div>
                </div>
            </div>
            <div class="modal-footer"><button class="btn btn-secondary" onclick="app.closeSettings()">Cancel</button><button class="btn btn-primary" onclick="app.saveSettings()">Save</button></div>
        </div>
    </div>
    <script src="app.js"></script>
</body>
</html>
