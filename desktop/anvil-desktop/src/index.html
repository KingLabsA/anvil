<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Anvil Desktop</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
        }
        .container {
            text-align: center;
            padding: 2rem;
        }
        h1 {
            font-size: 3rem;
            margin-bottom: 1rem;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }
        p {
            font-size: 1.2rem;
            margin-bottom: 2rem;
            opacity: 0.9;
        }
        .loader {
            border: 4px solid rgba(255,255,255,0.3);
            border-top: 4px solid white;
            border-radius: 50%;
            width: 50px;
            height: 50px;
            animation: spin 1s linear infinite;
            margin: 2rem auto;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        .status {
            font-size: 1rem;
            opacity: 0.8;
        }
        iframe {
            width: 100%;
            height: 100vh;
            border: none;
            display: none;
        }
    </style>
</head>
<body>
    <div class="container" id="loading">
        <h1>🔨 Anvil Desktop</h1>
        <p>Self-Verified Coding Agent</p>
        <div class="loader"></div>
        <p class="status" id="status">Starting Anvil server...</p>
    </div>
    <iframe id="anvil-frame" src="http://localhost:8000"></iframe>

    <script>
        const statusEl = document.getElementById('status');
        const loadingEl = document.getElementById('loading');
        const frameEl = document.getElementById('anvil-frame');
        
        let attempts = 0;
        const maxAttempts = 30;
        
        function checkServer() {
            attempts++;
            statusEl.textContent = `Connecting to Anvil server... (attempt ${attempts}/${maxAttempts})`;
            
            fetch('http://localhost:8000/health')
                .then(response => {
                    if (response.ok) {
                        statusEl.textContent = 'Connected! Loading Anvil...';
                        setTimeout(() => {
                            loadingEl.style.display = 'none';
                            frameEl.style.display = 'block';
                        }, 500);
                    } else {
                        retry();
                    }
                })
                .catch(error => {
                    if (attempts >= maxAttempts) {
                        statusEl.textContent = 'Failed to connect to Anvil server. Please start it manually with: anvil serve';
                        statusEl.style.color = '#ffcccc';
                    } else {
                        retry();
                    }
                });
        }
        
        function retry() {
            if (attempts < maxAttempts) {
                setTimeout(checkServer, 1000);
            }
        }
        
        // Start checking for server
        checkServer();
    </script>
</body>
</html>
