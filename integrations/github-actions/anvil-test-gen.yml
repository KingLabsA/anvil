# Anvil GitHub Actions Workflow Template
# This workflow automatically generates tests using Anvil

name: Anvil Test Generation

on:
  push:
    branches: [main, develop]
    paths:
      - '**/*.py'
      - '**/*.js'
      - '**/*.ts'
  workflow_dispatch:

jobs:
  generate-tests:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Install Anvil
        run: |
          pip install fableforge-anvil-agent[all]
      
      - name: Get changed source files
        id: changed-files
        uses: tj-actions/changed-files@v40
        with:
          files: |
            src/**/*.py
            lib/**/*.py
            app/**/*.py
            **/*.py
          files_ignore: |
            **/test_*.py
            **/*_test.py
            **/tests/**
      
      - name: Generate tests for changed files
        if: steps.changed-files.outputs.any_changed == 'true'
        run: |
          mkdir -p generated_tests
          
          for file in ${{ steps.changed-files.outputs.all_changed_files }}; do
            echo "Generating tests for: $file"
            
            # Determine test file name
            test_file="generated_tests/test_$(basename $file)"
            
            # Generate tests using Anvil
            anvil generate-tests "$file" > "$test_file" 2>&1 || echo "Failed to generate tests for $file"
          done
      
      - name: Create Pull Request with generated tests
        if: steps.changed-files.outputs.any_changed == 'true'
        uses: peter-evans/create-pull-request@v5
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "test: auto-generate tests with Anvil"
          title: "🤖 Auto-generated tests by Anvil"
          body: |
            ## Auto-generated Tests
            
            This PR contains automatically generated tests created by Anvil AI.
            
            ### Changed Files
            ${{ steps.changed-files.outputs.all_changed_files }}
            
            ### Next Steps
            1. Review the generated tests
            2. Run the test suite to verify they pass
            3. Add any additional test cases as needed
            4. Merge when ready
            
            ---
            🤖 Generated by [Anvil](https://github.com/KingLabsA/anvil)
          branch: anvil/auto-generated-tests
          delete-branch: true
          labels: |
            automated
            tests
            ai-generated
      
      - name: Upload generated tests
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: generated-tests
          path: generated_tests/
