<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Anvil — Self-Verified Coding Agent</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        *,*::before,*::after{margin:0;padding:0;box-sizing:border-box}

        :root {
            --gradient-primary: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            --gradient-accent: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            --gradient-blue: linear-gradient(135deg, #3b82f6 0%, #8b5cf6 100%);
            --gradient-green: linear-gradient(135deg, #10b981 0%, #059669 100%);

            --bg-primary: #09090b;
            --bg-secondary: #0f0f12;
            --bg-tertiary: #18181b;
            --bg-elevated: rgba(255,255,255,0.03);

            --glass-bg: rgba(255,255,255,0.03);
            --glass-border: rgba(255,255,255,0.07);
            --glass-blur: 20px;

            --text-primary: #fafafa;
            --text-secondary: #a1a1aa;
            --text-tertiary: #52525b;

            --accent-blue: #3b82f6;
            --accent-purple: #8b5cf6;
            --accent-pink: #ec4899;
            --accent-green: #10b981;
            --accent-orange: #f59e0b;
            --accent-red: #ef4444;

            --border-subtle: rgba(255,255,255,0.05);
            --border-default: rgba(255,255,255,0.08);
            --border-strong: rgba(255,255,255,0.14);

            --shadow-sm: 0 1px 2px rgba(0,0,0,0.3);
            --shadow-md: 0 4px 16px rgba(0,0,0,0.4);
            --shadow-lg: 0 8px 32px rgba(0,0,0,0.5);
            --shadow-glow: 0 0 40px rgba(102,126,234,0.15);

            --radius-sm: 6px;
            --radius-md: 10px;
            --radius-lg: 16px;
            --radius-xl: 24px;

            --ease-out: cubic-bezier(0.4, 0, 0.2, 1);
            --ease-bounce: cubic-bezier(0.34, 1.56, 0.64, 1);
            --duration-fast: 150ms;
            --duration-normal: 250ms;
            --duration-slow: 400ms;

            --sidebar-width: 280px;
            --header-height: 52px;
            --statusbar-height: 32px;
        }

        html { font-size: 14px; }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            font-feature-settings: 'cv02','cv03','cv04','cv11';
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
            background: var(--bg-primary);
            color: var(--text-primary);
            height: 100vh;
            overflow: hidden;
            line-height: 1.5;
        }

        code, pre, .mono {
            font-family: 'JetBrains Mono', 'Fira Code', 'Consolas', monospace;
            font-feature-settings: 'liga' 1;
        }

        ::selection { background: rgba(102,126,234,0.3); color: #fff; }
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 3px; }
        ::-webkit-scrollbar-thumb:hover { background: rgba(255,255,255,0.2); }

        .app {
            display: grid;
            grid-template-rows: var(--header-height) 1fr var(--statusbar-height);
            grid-template-columns: var(--sidebar-width) 1fr;
            height: 100vh;
        }

        /* Header */
        .header {
            grid-column: 1 / -1;
            background: var(--glass-bg);
            backdrop-filter: blur(var(--glass-blur));
            -webkit-backdrop-filter: blur(var(--glass-blur));
            border-bottom: 1px solid var(--border-subtle);
            display: flex;
            align-items: center;
            padding: 0 16px;
            gap: 12px;
            z-index: 100;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 1rem;
            font-weight: 700;
            background: var(--gradient-primary);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            letter-spacing: -0.02em;
            user-select: none;
        }

        .logo-icon {
            width: 24px;
            height: 24px;
            background: var(--gradient-primary);
            border-radius: var(--radius-sm);
            display: flex;
            align-items: center;
            justify-content: center;
            color: #fff;
            font-size: 12px;
            -webkit-text-fill-color: #fff;
        }

        .header-search {
            flex: 1;
            max-width: 480px;
            position: relative;
        }

        .header-search input {
            width: 100%;
            height: 32px;
            background: var(--bg-elevated);
            border: 1px solid var(--border-subtle);
            border-radius: var(--radius-md);
            padding: 0 12px 0 34px;
            color: var(--text-primary);
            font-size: 0.85rem;
            font-family: inherit;
            outline: none;
            transition: all var(--duration-fast) var(--ease-out);
        }

        .header-search input:focus {
            border-color: var(--accent-blue);
            box-shadow: 0 0 0 3px rgba(59,130,246,0.15);
        }

        .header-search input::placeholder { color: var(--text-tertiary); }

        .header-search .search-icon {
            position: absolute;
            left: 10px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-tertiary);
            font-size: 0.75rem;
            pointer-events: none;
        }

        .header-search kbd {
            position: absolute;
            right: 8px;
            top: 50%;
            transform: translateY(-50%);
            background: var(--bg-tertiary);
            border: 1px solid var(--border-default);
            border-radius: 4px;
            padding: 1px 6px;
            font-size: 0.7rem;
            color: var(--text-tertiary);
            font-family: inherit;
        }

        .header-actions {
            display: flex;
            align-items: center;
            gap: 4px;
            margin-left: auto;
        }

        .header-btn {
            width: 32px;
            height: 32px;
            display: flex;
            align-items: center;
            justify-content: center;
            border: none;
            background: transparent;
            color: var(--text-secondary);
            border-radius: var(--radius-sm);
            cursor: pointer;
            transition: all var(--duration-fast) var(--ease-out);
            font-size: 0.9rem;
            position: relative;
        }

        .header-btn:hover {
            background: var(--bg-elevated);
            color: var(--text-primary);
        }

        .header-btn .badge {
            position: absolute;
            top: 4px;
            right: 4px;
            width: 8px;
            height: 8px;
            background: var(--accent-red);
            border-radius: 50%;
            border: 1.5px solid var(--bg-primary);
        }

        .avatar {
            width: 28px;
            height: 28px;
            border-radius: 50%;
            background: var(--gradient-primary);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.7rem;
            font-weight: 600;
            color: #fff;
            cursor: pointer;
            transition: transform var(--duration-fast) var(--ease-bounce);
        }

        .avatar:hover { transform: scale(1.1); }

        /* Sidebar */
        .sidebar {
            background: var(--bg-secondary);
            border-right: 1px solid var(--border-subtle);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            transition: width var(--duration-normal) var(--ease-out);
        }

        .sidebar-tabs {
            display: flex;
            border-bottom: 1px solid var(--border-subtle);
            padding: 0 8px;
        }

        .sidebar-tab {
            flex: 1;
            padding: 10px 0;
            text-align: center;
            font-size: 0.75rem;
            font-weight: 500;
            color: var(--text-tertiary);
            cursor: pointer;
            border-bottom: 2px solid transparent;
            transition: all var(--duration-fast) var(--ease-out);
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .sidebar-tab:hover { color: var(--text-secondary); }

        .sidebar-tab.active {
            color: var(--text-primary);
            border-bottom-color: var(--accent-blue);
        }

        .sidebar-content {
            flex: 1;
            overflow-y: auto;
            padding: 8px;
        }

        .sidebar-section { margin-bottom: 16px; }

        .sidebar-section-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 6px 8px;
            font-size: 0.7rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            color: var(--text-tertiary);
            cursor: pointer;
            user-select: none;
        }

        .sidebar-section-header:hover { color: var(--text-secondary); }

        .sidebar-section-header .chevron {
            transition: transform var(--duration-fast) var(--ease-out);
            font-size: 0.6rem;
        }

        .sidebar-section.collapsed .chevron { transform: rotate(-90deg); }
        .sidebar-section.collapsed .sidebar-section-body { display: none; }

        .file-tree-item {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 5px 8px;
            border-radius: var(--radius-sm);
            cursor: pointer;
            font-size: 0.82rem;
            color: var(--text-secondary);
            transition: all var(--duration-fast) var(--ease-out);
            user-select: none;
        }

        .file-tree-item:hover {
            background: var(--bg-elevated);
            color: var(--text-primary);
        }

        .file-tree-item.active {
            background: rgba(59,130,246,0.1);
            color: var(--accent-blue);
        }

        .file-tree-item .file-icon {
            width: 16px;
            text-align: center;
            font-size: 0.75rem;
            flex-shrink: 0;
        }

        .file-tree-item .file-name { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

        .file-tree-item .file-badge {
            font-size: 0.65rem;
            font-weight: 600;
            padding: 1px 5px;
            border-radius: 3px;
            text-transform: uppercase;
        }

        .file-badge.modified { color: var(--accent-orange); background: rgba(245,158,11,0.1); }
        .file-badge.added { color: var(--accent-green); background: rgba(16,185,129,0.1); }
        .file-badge.deleted { color: var(--accent-red); background: rgba(239,68,68,0.1); }

        /* Main Panel */
        .main-panel {
            display: flex;
            flex-direction: column;
            overflow: hidden;
            background: var(--bg-primary);
        }

        /* Editor Tabs */
        .editor-tabs {
            display: flex;
            background: var(--bg-secondary);
            border-bottom: 1px solid var(--border-subtle);
            overflow-x: auto;
            min-height: 36px;
        }

        .editor-tab {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 0 14px;
            height: 36px;
            font-size: 0.8rem;
            color: var(--text-tertiary);
            cursor: pointer;
            border-right: 1px solid var(--border-subtle);
            white-space: nowrap;
            transition: all var(--duration-fast) var(--ease-out);
            position: relative;
        }

        .editor-tab:hover { color: var(--text-secondary); background: var(--bg-elevated); }

        .editor-tab.active {
            color: var(--text-primary);
            background: var(--bg-primary);
        }

        .editor-tab.active::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            height: 2px;
            background: var(--gradient-primary);
        }

        .editor-tab .tab-close {
            width: 16px;
            height: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 3px;
            font-size: 0.6rem;
            opacity: 0;
            transition: all var(--duration-fast) var(--ease-out);
        }

        .editor-tab:hover .tab-close { opacity: 0.5; }
        .editor-tab .tab-close:hover { opacity: 1; background: rgba(255,255,255,0.1); }

        .tab-modified {
            width: 8px;
            height: 8px;
            background: var(--accent-orange);
            border-radius: 50%;
        }

        /* Chat Area */
        .chat-area {
            flex: 1;
            overflow-y: auto;
            padding: 24px;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .chat-empty {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 16px;
            color: var(--text-tertiary);
        }

        .chat-empty-icon {
            width: 64px;
            height: 64px;
            background: var(--gradient-primary);
            border-radius: var(--radius-lg);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
            color: #fff;
            box-shadow: var(--shadow-glow);
        }

        .chat-empty h2 {
            font-size: 1.1rem;
            font-weight: 600;
            color: var(--text-secondary);
        }

        .chat-empty p { font-size: 0.85rem; max-width: 360px; text-align: center; line-height: 1.6; }

        .quick-actions {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 8px;
            margin-top: 8px;
            max-width: 400px;
            width: 100%;
        }

        .quick-action-btn {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 12px 16px;
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            border-radius: var(--radius-md);
            color: var(--text-secondary);
            font-size: 0.82rem;
            cursor: pointer;
            transition: all var(--duration-fast) var(--ease-out);
            text-align: left;
            font-family: inherit;
        }

        .quick-action-btn:hover {
            background: var(--bg-elevated);
            border-color: var(--border-strong);
            color: var(--text-primary);
            transform: translateY(-1px);
            box-shadow: var(--shadow-sm);
        }

        .quick-action-btn .qa-icon {
            width: 28px;
            height: 28px;
            border-radius: var(--radius-sm);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.8rem;
            flex-shrink: 0;
        }

        .qa-icon.blue { background: rgba(59,130,246,0.15); color: var(--accent-blue); }
        .qa-icon.purple { background: rgba(139,92,246,0.15); color: var(--accent-purple); }
        .qa-icon.green { background: rgba(16,185,129,0.15); color: var(--accent-green); }
        .qa-icon.orange { background: rgba(245,158,11,0.15); color: var(--accent-orange); }

        /* Message Bubbles */
        .message {
            display: flex;
            gap: 12px;
            animation: messageIn var(--duration-normal) var(--ease-out);
        }

        @keyframes messageIn {
            from { opacity: 0; transform: translateY(8px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .message-avatar {
            width: 28px;
            height: 28px;
            border-radius: var(--radius-sm);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.7rem;
            flex-shrink: 0;
            font-weight: 600;
        }

        .message-avatar.user { background: var(--gradient-primary); color: #fff; }
        .message-avatar.assistant { background: var(--bg-tertiary); border: 1px solid var(--border-default); color: var(--accent-blue); }

        .message-body { flex: 1; min-width: 0; }

        .message-header {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 4px;
        }

        .message-name { font-size: 0.82rem; font-weight: 600; color: var(--text-primary); }
        .message-time { font-size: 0.7rem; color: var(--text-tertiary); }

        .message-content {
            font-size: 0.88rem;
            color: var(--text-secondary);
            line-height: 1.7;
        }

        .message-content p { margin-bottom: 8px; }
        .message-content p:last-child { margin-bottom: 0; }

        .message-content code {
            background: var(--bg-tertiary);
            padding: 2px 6px;
            border-radius: 4px;
            font-size: 0.82em;
            color: var(--accent-pink);
        }

        .message-content pre {
            background: var(--bg-secondary);
            border: 1px solid var(--border-subtle);
            border-radius: var(--radius-md);
            padding: 16px;
            margin: 8px 0;
            overflow-x: auto;
            position: relative;
        }

        .message-content pre code {
            background: none;
            padding: 0;
            color: var(--text-primary);
            font-size: 0.82rem;
            line-height: 1.6;
        }

        .code-copy-btn {
            position: absolute;
            top: 8px;
            right: 8px;
            width: 28px;
            height: 28px;
            background: var(--bg-tertiary);
            border: 1px solid var(--border-default);
            border-radius: var(--radius-sm);
            color: var(--text-tertiary);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.7rem;
            opacity: 0;
            transition: all var(--duration-fast) var(--ease-out);
        }

        .message-content pre:hover .code-copy-btn { opacity: 1; }
        .code-copy-btn:hover { background: var(--bg-elevated); color: var(--text-primary); }

        .message-actions {
            display: flex;
            gap: 4px;
            margin-top: 8px;
            opacity: 0;
            transition: opacity var(--duration-fast) var(--ease-out);
        }

        .message:hover .message-actions { opacity: 1; }

        .msg-action-btn {
            height: 26px;
            padding: 0 8px;
            display: flex;
            align-items: center;
            gap: 4px;
            background: transparent;
            border: 1px solid var(--border-subtle);
            border-radius: var(--radius-sm);
            color: var(--text-tertiary);
            font-size: 0.7rem;
            cursor: pointer;
            transition: all var(--duration-fast) var(--ease-out);
            font-family: inherit;
        }

        .msg-action-btn:hover {
            background: var(--bg-elevated);
            color: var(--text-secondary);
            border-color: var(--border-default);
        }

        /* Typing Indicator */
        .typing-indicator { display: flex; gap: 4px; padding: 8px 0; }

        .typing-dot {
            width: 6px;
            height: 6px;
            background: var(--text-tertiary);
            border-radius: 50%;
            animation: typingBounce 1.4s infinite ease-in-out;
        }

        .typing-dot:nth-child(2) { animation-delay: 0.2s; }
        .typing-dot:nth-child(3) { animation-delay: 0.4s; }

        @keyframes typingBounce {
            0%, 80%, 100% { transform: scale(0.6); opacity: 0.4; }
            40% { transform: scale(1); opacity: 1; }
        }

        /* Input Area */
        .input-area {
            padding: 16px 24px 20px;
            border-top: 1px solid var(--border-subtle);
            background: var(--bg-primary);
        }

        .input-wrapper {
            position: relative;
            background: var(--bg-secondary);
            border: 1px solid var(--border-default);
            border-radius: var(--radius-lg);
            transition: all var(--duration-fast) var(--ease-out);
            overflow: hidden;
        }

        .input-wrapper:focus-within {
            border-color: var(--accent-blue);
            box-shadow: 0 0 0 3px rgba(59,130,246,0.1), var(--shadow-md);
        }

        .input-wrapper textarea {
            width: 100%;
            min-height: 44px;
            max-height: 200px;
            padding: 12px 52px 12px 16px;
            background: transparent;
            border: none;
            color: var(--text-primary);
            font-size: 0.88rem;
            font-family: inherit;
            line-height: 1.5;
            resize: none;
            outline: none;
        }

        .input-wrapper textarea::placeholder { color: var(--text-tertiary); }

        .input-submit {
            position: absolute;
            right: 8px;
            bottom: 8px;
            width: 34px;
            height: 34px;
            background: var(--gradient-primary);
            border: none;
            border-radius: var(--radius-sm);
            color: #fff;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.85rem;
            transition: all var(--duration-fast) var(--ease-out);
        }

        .input-submit:hover { transform: scale(1.05); box-shadow: var(--shadow-glow); }
        .input-submit:active { transform: scale(0.95); }
        .input-submit:disabled { opacity: 0.4; cursor: not-allowed; transform: none; box-shadow: none; }

        .input-toolbar {
            display: flex;
            align-items: center;
            gap: 4px;
            padding: 6px 10px;
            border-top: 1px solid var(--border-subtle);
        }

        .toolbar-btn {
            height: 26px;
            padding: 0 8px;
            display: flex;
            align-items: center;
            gap: 5px;
            background: transparent;
            border: none;
            border-radius: var(--radius-sm);
            color: var(--text-tertiary);
            font-size: 0.72rem;
            cursor: pointer;
            transition: all var(--duration-fast) var(--ease-out);
            font-family: inherit;
        }

        .toolbar-btn:hover { background: var(--bg-elevated); color: var(--text-secondary); }

        /* Status Bar */
        .statusbar {
            grid-column: 1 / -1;
            background: var(--glass-bg);
            backdrop-filter: blur(var(--glass-blur));
            -webkit-backdrop-filter: blur(var(--glass-blur));
            border-top: 1px solid var(--border-subtle);
            display: flex;
            align-items: center;
            padding: 0 12px;
            font-size: 0.7rem;
            color: var(--text-tertiary);
            gap: 16px;
        }

        .status-item {
            display: flex;
            align-items: center;
            gap: 5px;
            cursor: pointer;
            padding: 2px 6px;
            border-radius: 3px;
            transition: all var(--duration-fast) var(--ease-out);
        }

        .status-item:hover { background: var(--bg-elevated); color: var(--text-secondary); }

        .status-dot {
            width: 7px;
            height: 7px;
            border-radius: 50%;
            background: var(--accent-green);
            animation: statusPulse 2s infinite;
        }

        .status-dot.error { background: var(--accent-red); }
        .status-dot.warning { background: var(--accent-orange); }

        @keyframes statusPulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        .statusbar-right {
            margin-left: auto;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        /* Command Palette */
        .command-palette-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.6);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            z-index: 1000;
            align-items: flex-start;
            justify-content: center;
            padding-top: 20vh;
            animation: fadeIn var(--duration-fast) var(--ease-out);
        }

        .command-palette-overlay.visible { display: flex; }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        .command-palette {
            width: 560px;
            max-height: 420px;
            background: var(--bg-secondary);
            border: 1px solid var(--border-default);
            border-radius: var(--radius-lg);
            box-shadow: var(--shadow-lg);
            overflow: hidden;
            animation: paletteIn var(--duration-normal) var(--ease-bounce);
        }

        @keyframes paletteIn {
            from { opacity: 0; transform: scale(0.96) translateY(-10px); }
            to { opacity: 1; transform: scale(1) translateY(0); }
        }

        .command-palette-input {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 14px 16px;
            border-bottom: 1px solid var(--border-subtle);
        }

        .command-palette-input i { color: var(--text-tertiary); font-size: 0.9rem; }

        .command-palette-input input {
            flex: 1;
            background: transparent;
            border: none;
            color: var(--text-primary);
            font-size: 0.95rem;
            font-family: inherit;
            outline: none;
        }

        .command-palette-input input::placeholder { color: var(--text-tertiary); }

        .command-results {
            overflow-y: auto;
            max-height: 340px;
            padding: 6px;
        }

        .command-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 10px 12px;
            border-radius: var(--radius-sm);
            cursor: pointer;
            transition: all var(--duration-fast) var(--ease-out);
        }

        .command-item:hover, .command-item.selected { background: var(--bg-elevated); }
        .command-item.selected { background: rgba(59,130,246,0.1); }

        .command-item-icon {
            width: 28px;
            height: 28px;
            background: var(--bg-tertiary);
            border-radius: var(--radius-sm);
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--text-secondary);
            font-size: 0.75rem;
            flex-shrink: 0;
        }

        .command-item-text { flex: 1; }
        .command-item-name { font-size: 0.85rem; color: var(--text-primary); }
        .command-item-desc { font-size: 0.72rem; color: var(--text-tertiary); margin-top: 1px; }

        .command-item-kbd {
            font-size: 0.65rem;
            color: var(--text-tertiary);
            background: var(--bg-tertiary);
            padding: 2px 6px;
            border-radius: 3px;
            border: 1px solid var(--border-subtle);
            font-family: inherit;
        }

        /* Notifications */
        .notification-container {
            position: fixed;
            top: 60px;
            right: 16px;
            z-index: 2000;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .notification {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 12px 16px;
            background: var(--bg-secondary);
            border: 1px solid var(--border-default);
            border-radius: var(--radius-md);
            box-shadow: var(--shadow-md);
            font-size: 0.82rem;
            color: var(--text-primary);
            animation: notifIn var(--duration-normal) var(--ease-bounce);
            min-width: 280px;
            max-width: 400px;
        }

        .notification.removing { animation: notifOut var(--duration-fast) var(--ease-out) forwards; }

        @keyframes notifIn {
            from { opacity: 0; transform: translateX(100%); }
            to { opacity: 1; transform: translateX(0); }
        }

        @keyframes notifOut {
            from { opacity: 1; transform: translateX(0); }
            to { opacity: 0; transform: translateX(100%); }
        }

        .notification-icon {
            width: 24px;
            height: 24px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.7rem;
            flex-shrink: 0;
        }

        .notification.success .notification-icon { background: rgba(16,185,129,0.15); color: var(--accent-green); }
        .notification.error .notification-icon { background: rgba(239,68,68,0.15); color: var(--accent-red); }
        .notification.warning .notification-icon { background: rgba(245,158,11,0.15); color: var(--accent-orange); }
        .notification.info .notification-icon { background: rgba(59,130,246,0.15); color: var(--accent-blue); }

        .notification-close {
            margin-left: auto;
            background: none;
            border: none;
            color: var(--text-tertiary);
            cursor: pointer;
            padding: 4px;
            font-size: 0.7rem;
        }

        .notification-close:hover { color: var(--text-secondary); }

        /* Skeleton Loading */
        .skeleton {
            background: linear-gradient(90deg, var(--bg-tertiary) 25%, var(--bg-elevated) 50%, var(--bg-tertiary) 75%);
            background-size: 200% 100%;
            animation: shimmer 1.5s infinite;
            border-radius: var(--radius-sm);
        }

        @keyframes shimmer {
            0% { background-position: 200% 0; }
            100% { background-position: -200% 0; }
        }

        /* Drop Zone Overlay */
        .drop-zone-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.7);
            backdrop-filter: blur(12px);
            z-index: 3000;
            align-items: center;
            justify-content: center;
        }

        .drop-zone-overlay.visible { display: flex; }

        .drop-zone-content {
            text-align: center;
            color: var(--text-secondary);
        }

        .drop-zone-content i {
            font-size: 3rem;
            margin-bottom: 16px;
            background: var(--gradient-primary);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .drop-zone-content p { font-size: 1rem; font-weight: 500; }

        /* Bottom Panels */
        .bottom-panel {
            display: none;
            border-top: 1px solid var(--border-subtle);
            background: var(--bg-secondary);
            max-height: 300px;
            overflow-y: auto;
            padding: 16px;
        }

        .bottom-panel.visible { display: block; }

        .panel-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 12px;
        }

        .panel-title { font-size: 0.82rem; font-weight: 600; color: var(--text-primary); }

        .panel-close {
            width: 24px;
            height: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: transparent;
            border: none;
            color: var(--text-tertiary);
            cursor: pointer;
            border-radius: var(--radius-sm);
            font-size: 0.7rem;
        }

        .panel-close:hover { background: var(--bg-elevated); color: var(--text-secondary); }

        /* Multi-edit */
        .multi-edit-item {
            background: var(--bg-elevated);
            border: 1px solid var(--border-subtle);
            border-radius: var(--radius-md);
            padding: 12px;
            margin-bottom: 8px;
        }

        .multi-edit-row {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .multi-edit-row select,
        .multi-edit-row input,
        .multi-edit-row textarea {
            background: var(--bg-tertiary);
            border: 1px solid var(--border-default);
            border-radius: var(--radius-sm);
            color: var(--text-primary);
            padding: 8px 10px;
            font-size: 0.82rem;
            font-family: inherit;
            outline: none;
        }

        .multi-edit-row select:focus,
        .multi-edit-row input:focus,
        .multi-edit-row textarea:focus { border-color: var(--accent-blue); }

        .multi-edit-row textarea {
            min-height: 80px;
            resize: vertical;
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.78rem;
        }

        .remove-edit-btn {
            align-self: flex-end;
            padding: 4px 10px;
            background: rgba(239,68,68,0.1);
            border: 1px solid rgba(239,68,68,0.2);
            border-radius: var(--radius-sm);
            color: var(--accent-red);
            font-size: 0.72rem;
            cursor: pointer;
            font-family: inherit;
        }

        .remove-edit-btn:hover { background: rgba(239,68,68,0.2); }

        /* Debug */
        .debug-controls { display: flex; gap: 6px; flex-wrap: wrap; }

        .debug-btn {
            height: 30px;
            padding: 0 12px;
            display: flex;
            align-items: center;
            gap: 6px;
            background: var(--bg-elevated);
            border: 1px solid var(--border-default);
            border-radius: var(--radius-sm);
            color: var(--text-secondary);
            font-size: 0.75rem;
            cursor: pointer;
            transition: all var(--duration-fast) var(--ease-out);
            font-family: inherit;
        }

        .debug-btn:hover { background: var(--bg-tertiary); color: var(--text-primary); }
        .debug-btn.primary { background: rgba(59,130,246,0.15); border-color: rgba(59,130,246,0.3); color: var(--accent-blue); }

        /* Responsive */
        @media (max-width: 768px) {
            .app { grid-template-columns: 1fr; }
            .sidebar { display: none; }
            .quick-actions { grid-template-columns: 1fr; }
            .command-palette { width: calc(100vw - 32px); }
        }

        :focus-visible { outline: 2px solid var(--accent-blue); outline-offset: 2px; }
    </style>
</head>
<body>
    <div class="app" role="application" aria-label="Anvil Coding Agent">
        <header class="header" role="banner">
            <div class="logo" aria-label="Anvil">
                <div class="logo-icon"><i class="fas fa-hammer"></i></div>
                Anvil
            </div>
            <div class="header-search">
                <i class="fas fa-search search-icon"></i>
                <input type="text" id="global-search" placeholder="Search files, commands..." aria-label="Search" autocomplete="off">
                <kbd>Ctrl K</kbd>
            </div>
            <div class="header-actions">
                <button class="header-btn" id="btn-notifications" aria-label="Notifications" title="Notifications">
                    <i class="fas fa-bell"></i>
                    <span class="badge"></span>
                </button>
                <button class="header-btn" id="btn-settings" aria-label="Settings" title="Settings">
                    <i class="fas fa-cog"></i>
                </button>
                <button class="header-btn" id="theme-toggle" aria-label="Toggle theme" title="Toggle theme">
                    <i class="fas fa-moon"></i>
                </button>
                <div class="avatar" title="User">U</div>
            </div>
        </header>

        <aside class="sidebar" role="navigation" aria-label="File Explorer">
            <div class="sidebar-tabs">
                <div class="sidebar-tab active" data-tab="files">Files</div>
                <div class="sidebar-tab" data-tab="search">Search</div>
                <div class="sidebar-tab" data-tab="git">Git</div>
            </div>
            <div class="sidebar-content" id="sidebar-content">
                <div class="sidebar-section">
                    <div class="sidebar-section-header">
                        <span>Project</span>
                        <i class="fas fa-chevron-down chevron"></i>
                    </div>
                    <div class="sidebar-section-body" id="file-tree">
                        <div class="file-tree-item active">
                            <span class="file-icon"><i class="fas fa-folder" style="color:var(--accent-blue)"></i></span>
                            <span class="file-name">src</span>
                        </div>
                        <div class="file-tree-item" style="padding-left:24px">
                            <span class="file-icon"><i class="fas fa-file-code" style="color:var(--accent-orange)"></i></span>
                            <span class="file-name">main.py</span>
                            <span class="file-badge modified">M</span>
                        </div>
                        <div class="file-tree-item" style="padding-left:24px">
                            <span class="file-icon"><i class="fas fa-file-code" style="color:var(--accent-blue)"></i></span>
                            <span class="file-name">utils.py</span>
                        </div>
                        <div class="file-tree-item">
                            <span class="file-icon"><i class="fas fa-file" style="color:var(--text-tertiary)"></i></span>
                            <span class="file-name">README.md</span>
                        </div>
                        <div class="file-tree-item">
                            <span class="file-icon"><i class="fas fa-file" style="color:var(--text-tertiary)"></i></span>
                            <span class="file-name">pyproject.toml</span>
                            <span class="file-badge added">A</span>
                        </div>
                    </div>
                </div>
            </div>
        </aside>

        <main class="main-panel" role="main">
            <div class="editor-tabs" id="editor-tabs" role="tablist">
                <div class="editor-tab active" role="tab" aria-selected="true">
                    <i class="fas fa-file-code" style="font-size:0.7rem;color:var(--accent-orange)"></i>
                    <span>main.py</span>
                    <span class="tab-modified" title="Modified"></span>
                    <span class="tab-close" title="Close"><i class="fas fa-times"></i></span>
                </div>
                <div class="editor-tab" role="tab" aria-selected="false">
                    <i class="fas fa-comment" style="font-size:0.7rem;color:var(--accent-blue)"></i>
                    <span>Chat</span>
                    <span class="tab-close"><i class="fas fa-times"></i></span>
                </div>
            </div>

            <div class="chat-area" id="chat-area">
                <div class="chat-empty" id="chat-empty">
                    <div class="chat-empty-icon"><i class="fas fa-hammer"></i></div>
                    <h2>What can I help you build?</h2>
                    <p>Ask me to write code, debug issues, explain logic, or refactor your project.</p>
                    <div class="quick-actions">
                        <button class="quick-action-btn" onclick="app.quickAction('analyze')">
                            <span class="qa-icon blue"><i class="fas fa-search"></i></span>
                            <span>Analyze Code</span>
                        </button>
                        <button class="quick-action-btn" onclick="app.quickAction('explain')">
                            <span class="qa-icon purple"><i class="fas fa-lightbulb"></i></span>
                            <span>Explain Code</span>
                        </button>
                        <button class="quick-action-btn" onclick="app.quickAction('optimize')">
                            <span class="qa-icon green"><i class="fas fa-bolt"></i></span>
                            <span>Optimize</span>
                        </button>
                        <button class="quick-action-btn" onclick="app.quickAction('review')">
                            <span class="qa-icon orange"><i class="fas fa-code"></i></span>
                            <span>Review Code</span>
                        </button>
                    </div>
                </div>
                <div id="response" style="display:none">
                    <div id="response-content"></div>
                </div>
            </div>

            <div class="bottom-panel" id="multi-file-edit-panel">
                <div class="panel-header">
                    <span class="panel-title">Multi-File Edit</span>
                    <button class="panel-close" onclick="app.hideMultiFileEdit()"><i class="fas fa-times"></i></button>
                </div>
                <div id="multi-edit-container"></div>
                <button class="debug-btn primary" id="add-multi-edit" style="margin-top:8px">
                    <i class="fas fa-plus"></i> Add File Edit
                </button>
            </div>

            <div class="bottom-panel" id="debug-panel">
                <div class="panel-header">
                    <span class="panel-title">Debugger</span>
                    <button class="panel-close" onclick="app.hideDebugPanel()"><i class="fas fa-times"></i></button>
                </div>
                <div class="debug-controls">
                    <button class="debug-btn primary" id="start-debug"><i class="fas fa-play"></i> Start</button>
                    <button class="debug-btn" id="continue-debug"><i class="fas fa-forward"></i> Continue</button>
                    <button class="debug-btn" id="step-over"><i class="fas fa-arrow-right"></i> Step Over</button>
                    <button class="debug-btn" id="step-into"><i class="fas fa-arrow-down"></i> Step Into</button>
                    <button class="debug-btn" id="step-out"><i class="fas fa-arrow-up"></i> Step Out</button>
                    <button class="debug-btn" id="stop-debug" style="color:var(--accent-red)"><i class="fas fa-stop"></i> Stop</button>
                </div>
                <div id="current-line" style="margin-top:8px;font-size:0.78rem;color:var(--text-tertiary)"></div>
                <div id="breakpoints-list" style="margin-top:8px"></div>
            </div>

            <div class="input-area">
                <div class="input-wrapper" id="drop-zone">
                    <textarea id="query" placeholder="Ask Anvil anything..." rows="1" aria-label="Task input"></textarea>
                    <button class="input-submit" id="submit" aria-label="Send" disabled>
                        <i class="fas fa-arrow-up"></i>
                    </button>
                    <div class="input-toolbar">
                        <button class="toolbar-btn" onclick="app.showMultiFileEdit()" title="Multi-file edit">
                            <i class="fas fa-layer-group"></i> Multi-Edit
                        </button>
                        <button class="toolbar-btn" onclick="app.showDebugPanel()" title="Debugger">
                            <i class="fas fa-bug"></i> Debug
                        </button>
                        <button class="toolbar-btn" title="Attach file">
                            <i class="fas fa-paperclip"></i> Attach
                        </button>
                    </div>
                </div>
            </div>
        </main>

        <footer class="statusbar" role="contentinfo">
            <div class="status-item">
                <span class="status-dot" id="status-dot"></span>
                <span id="status-text">Ready</span>
            </div>
            <div class="status-item" id="status-branch">
                <i class="fas fa-code-branch"></i>
                <span>main</span>
            </div>
            <div class="status-item" id="status-errors">
                <i class="fas fa-times-circle"></i>
                <span>0</span>
                <i class="fas fa-exclamation-triangle" style="margin-left:4px"></i>
                <span>0</span>
            </div>
            <div class="statusbar-right">
                <div class="status-item" id="status-model">
                    <i class="fas fa-microchip"></i>
                    <span>GPT-4</span>
                </div>
                <div class="status-item">
                    <span>UTF-8</span>
                </div>
            </div>
        </footer>
    </div>

    <div class="command-palette-overlay" id="command-palette" role="dialog" aria-label="Command Palette">
        <div class="command-palette">
            <div class="command-palette-input">
                <i class="fas fa-terminal"></i>
                <input type="text" id="command-input" placeholder="Type a command or search..." autocomplete="off" aria-label="Command input">
            </div>
            <div class="command-results" id="command-results" role="listbox"></div>
        </div>
    </div>

    <div class="notification-container" id="notification-container" aria-live="polite"></div>

    <div class="drop-zone-overlay" id="drop-overlay">
        <div class="drop-zone-content">
            <i class="fas fa-cloud-upload-alt"></i>
            <p>Drop files to analyze</p>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
