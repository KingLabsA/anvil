<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Anvil — The Self-Verified Coding Agent</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: #0d1117; color: #c9d1d9;
    height: 100vh; display: flex; flex-direction: column;
  }
  header {
    background: #161b22; padding: 12px 20px;
    border-bottom: 1px solid #30363d;
    display: flex; align-items: center; gap: 12px;
  }
  header h1 { font-size: 18px; font-weight: 600; }
  header .badge {
    background: #238636; color: #fff; font-size: 11px;
    padding: 2px 8px; border-radius: 12px;
  }
  #chat {
    flex: 1; overflow-y: auto; padding: 20px;
    display: flex; flex-direction: column; gap: 12px;
  }
  .msg {
    max-width: 80%; padding: 10px 14px; border-radius: 12px;
    line-height: 1.5; white-space: pre-wrap; word-break: break-word;
  }
  .msg.user {
    align-self: flex-end; background: #1f6feb; color: #fff;
    border-bottom-right-radius: 4px;
  }
  .msg.agent {
    align-self: flex-start; background: #161b22;
    border: 1px solid #30363d;
    border-bottom-left-radius: 4px;
  }
  .msg.agent.success { border-color: #238636; }
  .msg.agent.error { border-color: #da3633; }
  .msg.system {
    align-self: center; background: transparent;
    color: #8b949e; font-size: 12px; font-style: italic;
  }
  #input-area {
    background: #161b22; padding: 16px 20px;
    border-top: 1px solid #30363d;
    display: flex; gap: 10px;
  }
  #task-input {
    flex: 1; background: #0d1117; border: 1px solid #30363d;
    color: #c9d1d9; padding: 10px 14px; border-radius: 8px;
    font-size: 14px; resize: none; min-height: 44px; max-height: 200px;
    font-family: inherit;
  }
  #task-input:focus { outline: none; border-color: #1f6feb; }
  #send-btn {
    background: #238636; color: #fff; border: none;
    padding: 10px 20px; border-radius: 8px; cursor: pointer;
    font-weight: 600; font-size: 14px;
    align-self: flex-end;
  }
  #send-btn:hover { background: #2ea043; }
  #send-btn:disabled { background: #21262d; cursor: not-allowed; }
  .spinner {
    display: inline-block; width: 14px; height: 14px;
    border: 2px solid #30363d; border-top-color: #1f6feb;
    border-radius: 50%; animation: spin 0.8s linear infinite;
    vertical-align: middle; margin-right: 6px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>
<header>
  <h1>🔨 Anvil</h1>
  <span class="badge">v0.3.0</span>
  <span style="color:#8b949e;font-size:12px">The self-verified coding agent</span>
</header>

<div id="chat">
  <div class="msg agent">
    Hi! I'm Anvil. I write code, verify it works, and recover if it doesn't.
    Tell me what to build or fix.
  </div>
</div>

<div id="input-area">
  <textarea id="task-input" placeholder="Describe a task... e.g. 'Fix the bug in main.py so tests pass'" rows="1"></textarea>
  <button id="send-btn">Run</button>
</div>

<script>
const chat = document.getElementById('chat');
const input = document.getElementById('task-input');
const sendBtn = document.getElementById('send-btn');

function addMsg(text, cls) {
  const div = document.createElement('div');
  div.className = 'msg ' + cls;
  div.textContent = text;
  chat.appendChild(div);
  chat.scrollTop = chat.scrollHeight;
  return div;
}

function addStatus(text) {
  const div = document.createElement('div');
  div.className = 'msg system';
  div.innerHTML = '<span class="spinner"></span>' + text;
  chat.appendChild(div);
  chat.scrollTop = chat.scrollHeight;
  return div;
}

async function sendTask() {
  const task = input.value.trim();
  if (!task) return;

  sendBtn.disabled = true;
  input.value = '';
  input.style.height = 'auto';

  addMsg(task, 'user');
  const status = addStatus('Running task...');

  try {
    const resp = await fetch('/run', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ task, model: 'local', max_iterations: 20, verify: true }),
    });
    const data = await resp.json();
    status.remove();

    const cls = data.success ? 'agent success' : 'agent error';
    const prefix = data.success ? '✅ ' : '❌ ';
    addMsg(prefix + (data.output || data.error || 'Done'), cls);
  } catch (err) {
    status.remove();
    addMsg('Error: ' + err.message, 'agent error');
  } finally {
    sendBtn.disabled = false;
    input.focus();
  }
}

sendBtn.addEventListener('click', sendTask);
input.addEventListener('keydown', (e) => {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    sendTask();
  }
});

// Auto-resize textarea
input.addEventListener('input', () => {
  input.style.height = 'auto';
  input.style.height = Math.min(input.scrollHeight, 200) + 'px';
});
</script>
</body>
</html>
