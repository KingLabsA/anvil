<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Anvil - Self-Verified Coding Agent</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="/static/styles.css">
</head>
<body>
    <div class="app">
        <!-- Header -->
        <header class="header">
            <div class="logo">
                <div class="logo-icon"><i class="fas fa-hammer"></i></div>
                <span>Anvil</span>
            </div>
            <div class="header-actions">
                <button id="theme-toggle" class="icon-btn" title="Toggle theme">
                    <i class="fas fa-moon"></i>
                </button>
                <button id="settings-btn" class="icon-btn" title="Settings">
                    <i class="fas fa-cog"></i>
                </button>
            </div>
        </header>

        <!-- Main Content -->
        <div class="main-content">
            <!-- Sidebar -->
            <aside class="sidebar">
                <div class="sidebar-section">
                    <h3>Models</h3>
                    <div id="models-list" class="models-list"></div>
                </div>
                <div class="sidebar-section">
                    <h3>MCP Tools</h3>
                    <div id="mcp-tools-list" class="tools-list"></div>
                </div>
            </aside>

            <!-- Chat Area -->
            <main class="chat-area">
                <div id="chat-messages" class="chat-messages"></div>
                <div class="chat-input-area">
                    <textarea id="query" placeholder="Ask Anvil to help with your code..." rows="3"></textarea>
                    <button id="submit" class="btn-primary">
                        <i class="fas fa-paper-plane"></i> Send
                    </button>
                </div>
            </main>
        </div>

        <!-- Status Bar -->
        <footer class="status-bar">
            <div class="status-item">
                <div id="status-dot" class="status-dot"></div>
                <span id="status-text">Ready</span>
            </div>
            <div class="status-item">
                <i class="fas fa-code-branch"></i>
                <span>main</span>
            </div>
            <div class="status-item">
                <span>Anvil v0.3.0</span>
            </div>
        </footer>
    </div>

    <!-- Notification Container -->
    <div id="notification-container" class="notification-container"></div>

    <script src="/static/app.js"></script>
</body>
</html>
