name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      python: ${{ steps.filter.outputs.python }}
      typescript: ${{ steps.filter.outputs.typescript }}
      anvil: ${{ steps.filter.outputs.anvil }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            python:
              - '**/*.py'
              - '**/pyproject.toml'
              - '**/requirements*.txt'
            typescript:
              - '**/*.ts'
              - '**/*.tsx'
              - '**/package.json'
              - '**/tsconfig.json'
            anvil:
              - 'anvil/**'

  test-python:
    needs: detect-changes
    if: needs.detect-changes.outputs.python == 'true'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ['3.10', '3.11', '3.12']
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install tooling
        run: |
          python -m pip install --upgrade pip
          pip install pytest pytest-cov pytest-asyncio pytest-timeout ruff

      - name: Lint with ruff
        run: ruff check . --config ruff.toml --output-format=github

      # Flagship package must pass strictly.
      - name: Test flagship (anvil)
        run: |
          cd anvil
          pip install -e . --quiet
          pytest --tb=short -q --timeout=120

      # Remaining ecosystem packages are tested but reported as non-blocking
      # while the micro-package suites are stabilised.
      - name: Test ecosystem packages
        continue-on-error: true
        run: |
          failed=()
          for dir in $(find . -maxdepth 2 -name pyproject.toml -not -path './node_modules/*' -not -path '*/.*/*' | xargs -n1 dirname | sort -u); do
            if [ "$dir" = "./anvil" ] || [ ! -d "$dir/tests" ]; then
              continue
            fi
            echo "::group::Testing $dir"
            (
              cd "$dir"
              pip install -e . --quiet || pip install . --quiet || true
              pytest --tb=short -q --timeout=60 -p no:cacheprovider || exit 1
            ) || failed+=("$dir")
            echo "::endgroup::"
          done
          if [ ${#failed[@]} -ne 0 ]; then
            echo "::warning::Non-blocking test failures in: ${failed[*]}"
          fi

  test-typescript:
    needs: detect-changes
    if: needs.detect-changes.outputs.typescript == 'true'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node-version: [20]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}

      - name: Install and build each JS package
        run: |
          set -e
          for dir in $(find . -maxdepth 2 -name package.json -not -path '*/node_modules/*' | xargs -n1 dirname | sort -u); do
            echo "::group::Building $dir"
            (
              cd "$dir"
              if [ -f package-lock.json ]; then npm ci; else npm install; fi
              if npm run | grep -q ' build'; then npm run build --if-present; fi
            )
            echo "::endgroup::"
          done

  build-anvil-image:
    needs: detect-changes
    if: needs.detect-changes.outputs.anvil == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Set lowercase image name
        id: image
        run: |
          owner=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          echo "name=ghcr.io/${owner}/anvil" >> "$GITHUB_OUTPUT"

      # CI validates the image builds. Publishing to GHCR is handled by the
      # release workflow (which uses CR_PAT with package-write scope).
      - name: Build Anvil image (validation only)
        uses: docker/build-push-action@v6
        with:
          context: ./anvil
          file: ./anvil/Dockerfile
          push: false
          tags: |
            ${{ steps.image.outputs.name }}:latest
            ${{ steps.image.outputs.name }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max