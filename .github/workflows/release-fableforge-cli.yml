name: Release fableforge-cli to PyPI

on:
  workflow_dispatch:
  push:
    tags:
      - "fableforge-cli-v*"

permissions:
  id-token: write
  contents: read

jobs:
  build-and-publish:
    name: Build and publish to PyPI
    runs-on: ubuntu-latest
    permissions:
      id-token: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build dependencies
        run: python -m pip install --upgrade build
        working-directory: fableforge-cli

      - name: Build package
        run: python -m build
        working-directory: fableforge-cli

      - name: Publish package to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: fableforge-cli/dist/
          skip-existing: true
